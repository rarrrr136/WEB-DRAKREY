<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DARKREY - DASHBOARD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Courier New', monospace;
            color: #0f0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }

        .refresh-indicator {
            position: fixed;
            top: -50px;
            left: 0;
            width: 100%;
            height: 50px;
            background: rgba(255,0,0,0.9);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            transition: top 0.3s;
            z-index: 9999;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .user-badge {
            background: #f00;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .logout-btn {
            background: #333;
            color: #f00;
            border: 1px solid #f00;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            margin: 20px 0 40px 0;
        }

        .header-logo {
            width: 180px;
            height: 180px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(255,0,0,0.7);
            flex-shrink: 0;
        }

        .header-text {
            flex-grow: 1;
            text-align: center;
        }

        .header-text h1 {
            color: #f00;
            font-size: 3rem;
            letter-spacing: 2px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 20px;
        }

        .menu-card {
            background: rgba(17,17,17,0.9);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #333;
        }

        .menu-card:hover {
            border-color: #f00;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255,0,0,0.2);
        }

        .menu-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f00;
            margin-bottom: 5px;
        }

        .menu-desc {
            font-size: 0.75rem;
            color: #888;
        }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header {
                flex-direction: column;
            }
            .header-logo {
                width: 130px;
                height: 130px;
            }
            .header-text h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>
<div id="refreshIndicator" class="refresh-indicator">↓ Tarik ke bawah untuk refresh</div>

<div class="container">
    <div class="top-bar">
        <span class="user-badge" id="userBadge"></span>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <div class="header">
        <img src="https://i.ibb.co.com/cVJhWXV/file-00000000cd70720b956cca190dd4f411.jpg" 
             alt="DARKREY LOGO" 
             class="header-logo"
             onerror="this.src='https://placehold.co/400x400?text=DARKREY'">
        <div class="header-text">
            <h1>DARKREY</h1>
        </div>
    </div>

    <div class="menu-grid" id="menuGrid"></div>
</div>

<script>
    // MATRIX RAIN
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "01アイウエオカキクケコサシスセソタチツテト0123456789";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = [];
    for(let i = 0; i < columns; i++) drops[i] = 1;
    
    function drawMatrix() {
        ctx.fillStyle = 'rgba(0,0,0,0.04)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#0f0';
        ctx.font = fontSize + 'px monospace';
        for(let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // PULL TO REFRESH
    let touchStartY = 0, refreshIndicator = document.getElementById('refreshIndicator');
    document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
    document.addEventListener('touchmove', (e) => {
        if ((window.scrollY || document.documentElement.scrollTop) === 0 && e.touches[0].clientY > touchStartY + 50) {
            refreshIndicator.style.top = '0px';
        }
    });
    document.addEventListener('touchend', () => {
        if (refreshIndicator.style.top === '0px') {
            refreshIndicator.style.top = '-50px';
            location.reload();
        }
    });

    // CEK LOGIN
    if(localStorage.getItem('darkray_logged') !== 'true') {
    window.location.href = 'login.html';
    }
    
    let currentUser = localStorage.getItem('darkray_current_user') || '';
    // Tampilkan nama user, termasuk admin (REYY.X) tetap muncul sebagai "ADMIN: REYY.X"
    let isAdmin = (currentUser === 'REYY.X');
    document.getElementById('userBadge').innerHTML = isAdmin ? 'ADMIN: REYY.X' : `USER: ${currentUser}`;
    
    // MENU (TANPA ADMIN PANEL)
    const menus = [
        { icon: "💀", title: "DDOS 7 LAYER", desc: "Stress test server", link: "ddos.html" },
        { icon: "📍", title: "GEO TRACKER", desc: "Lacak IP address", link: "geo.html" },
        { icon: "❤️", title: "SUNTIK LIKE", desc: "Auto like TikTok", link: "ttlike.html" },
        { icon: "👁️", title: "SUNTIK PENONTON", desc: "Boost viewers TikTok", link: "ttboost.html" },
        { icon: "🎣", title: "PHISHING LINK", desc: "Dapatkan IP target", link: "ihir.html" }
    ];
    
    const menuGrid = document.getElementById('menuGrid');
    menus.forEach(menu => {
        const card = document.createElement('div');
        card.className = 'menu-card';
        card.onclick = () => window.location.href = menu.link;
        card.innerHTML = `
            <div class="menu-icon">${menu.icon}</div>
            <div class="menu-title">${menu.title}</div>
            <div class="menu-desc">${menu.desc}</div>
        `;
        menuGrid.appendChild(card);
    });
    
    function logout() {
        localStorage.removeItem('darkray_logged');
        localStorage.removeItem('darkray_current_user');
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
