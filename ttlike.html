<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DARKREY - SUNTIK LIKE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Courier New', monospace; color: #0f0; min-height: 100vh; position: relative; overflow-x: hidden; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.2; pointer-events: none; }
        .refresh-indicator { position: fixed; top: -50px; left: 0; width: 100%; height: 50px; background: rgba(255,0,0,0.9); color: #fff; display: flex; justify-content: center; align-items: center; font-size: 14px; transition: top 0.3s; z-index: 9999; }
        .container { position: relative; z-index: 10; max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; align-items: center; }
        .card { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border: 1px solid #f00; border-radius: 24px; padding: 30px; width: 100%; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        h1 { color: #f00; text-align: center; font-size: 1.8rem; margin-bottom: 8px; }
        .back-btn { display: inline-block; background: #333; color: #f00; border: 1px solid #f00; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-family: monospace; }
        .info-box { background: #0a0a0a; border: 1px solid #f00; border-radius: 12px; padding: 10px; margin-bottom: 20px; text-align: center; font-size: 12px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #f00; color: #0f0; border-radius: 12px; font-family: monospace; }
        button { font-weight: bold; cursor: pointer; }
        button:hover { background: #f00; color: #000; }
        .log { background: #000; border: 1px solid #f00; border-radius: 12px; height: 200px; overflow-y: auto; padding: 12px; font-size: 11px; margin-top: 15px; }
        .log-entry { border-left: 2px solid #f00; padding-left: 10px; margin: 5px 0; word-break: break-all; }
        .reset-btn { background: #330000; margin-top: 5px; font-size: 12px; }
        @media (max-width: 480px) { .card { padding: 20px; } h1 { font-size: 1.4rem; } }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div id="refreshIndicator" class="refresh-indicator">↓ Tarik ke bawah untuk refresh</div>
<div class="container">
    <div class="card">
        <button class="back-btn" onclick="window.location.href='index.html'">← BACK</button>
        <h1>❤️ SUNTIK LIKE TIKTOK</h1>
        <div class="info-box">📌 Timer 24 jam per video<br>🔁 Bisa suntik video lain tanpa nunggu</div>
        <input type="text" id="tiktokUrl" placeholder="Link video TikTok">
        <button onclick="sendLike()">❤️ KIRIM LIKE</button>
        <button class="reset-btn" onclick="resetTimerForCurrent()">🔄 RESET TIMER VIDEO INI (HANYA JIKA ERROR)</button>
        <div id="logContainer" class="log">[READY]</div>
    </div>
</div>
<script>
    const canvas = document.getElementById('matrixCanvas'); const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const chars = "01アイウエオカキクケコサシスセソタチツテト0123456789"; const fontSize = 14; const columns = canvas.width / fontSize; const drops = [];
    for(let i=0;i<columns;i++) drops[i]=1;
    function drawMatrix() { ctx.fillStyle='rgba(0,0,0,0.04)'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#0f0'; ctx.font=fontSize+'px monospace'; for(let i=0;i<drops.length;i++){ const text=chars[Math.floor(Math.random()*chars.length)]; ctx.fillText(text,i*fontSize,drops[i]*fontSize); if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0; drops[i]++; } }
    setInterval(drawMatrix,50); window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
    let touchStartY=0, refreshIndicator=document.getElementById('refreshIndicator');
    document.addEventListener('touchstart',e=>{ touchStartY=e.touches[0].clientY; });
    document.addEventListener('touchmove',e=>{ if((window.scrollY||document.documentElement.scrollTop)===0 && e.touches[0].clientY>touchStartY+50) refreshIndicator.style.top='0px'; });
    document.addEventListener('touchend',()=>{ if(refreshIndicator.style.top==='0px'){ refreshIndicator.style.top='-50px'; location.reload(); } });
    if(localStorage.getItem('darkray_logged')!=='true') window.location.href='login.html';
    function getVideoId(url){ try{ if(url.includes('vt.tiktok.com')) return url.split('/').pop().split('?')[0]; const match=url.match(/\/video\/(\d+)/); if(match) return match[1]; return btoa(url).substring(0,20); }catch(e){ return btoa(url).substring(0,20); } }
    function getVideoTimer(videoId){ const lastTime=localStorage.getItem(`tiktok_like_${videoId}`); if(!lastTime) return null; const diff=Date.now()-parseInt(lastTime); if(diff>=24*60*60*1000) return null; return { remaining: (24*60*60*1000)-diff }; }
    function saveVideoSuccess(videoId){ localStorage.setItem(`tiktok_like_${videoId}`,Date.now().toString()); }
    function deleteVideoTimer(videoId){ localStorage.removeItem(`tiktok_like_${videoId}`); }
    function formatTime(ms){ const hours=Math.floor(ms/(60*60*1000)); const minutes=Math.floor((ms%(60*60*1000))/(60*1000)); const seconds=Math.floor((ms%60000)/1000); return `${hours} jam ${minutes} menit ${seconds} detik`; }
    function addLog(msg,isError=false){ const logDiv=document.getElementById('logContainer'); const div=document.createElement('div'); div.className='log-entry'; const time=new Date().toLocaleTimeString('id-ID',{hour12:false}); div.innerHTML=`[${time}] ${msg}`; div.style.color=isError?'#ff8888':'#88ff88'; logDiv.appendChild(div); div.scrollIntoView(); if(logDiv.children.length>100) logDiv.removeChild(logDiv.children[0]); }
    function cleanUrl(raw){ return raw.trim().split('?')[0].split('#')[0]; }
    function resetTimerForCurrent(){ const rawUrl=document.getElementById('tiktokUrl').value.trim(); if(!rawUrl){ addLog('Masukkan link video TikTok dulu!',true); return; } const clean=cleanUrl(rawUrl); const videoId=getVideoId(clean); const timer=getVideoTimer(videoId); if(!timer){ addLog(`Video ini tidak memiliki timer aktif. Bisa langsung suntik.`,false); return; } deleteVideoTimer(videoId); addLog(`🔄 Timer untuk video ini (ID: ${videoId}) telah direset. Sekarang bisa suntik ulang.`,false); }
    async function sendLike(){ const rawUrl=document.getElementById('tiktokUrl').value.trim(); if(!rawUrl){ addLog('Masukkan link video TikTok!',true); return; } const clean=cleanUrl(rawUrl); const videoId=getVideoId(clean); addLog(`🔍 ID Video: ${videoId}`,false); const timer=getVideoTimer(videoId); if(timer){ addLog(`⏳ Video ini sudah pernah di-suntik! Tunggu ${formatTime(timer.remaining)} lagi untuk suntik ulang.`,true); addLog(`💡 Coba video lain, atau gunakan tombol RESET jika ini error.`,false); return; } addLog(`❤️ Mengirim LIKE ke: ${clean}`,false); const apiUrl=`https://valzz-psi.vercel.app/api/tools/ttlike?url=${encodeURIComponent(clean)}`; try{ const response=await fetch(apiUrl); const text=await response.text(); let data; try{ data=JSON.parse(text); }catch(e){ addLog(`Respon API error: ${text.substring(0,200)}`,true); return; } addLog(`📦 Respon: ${JSON.stringify(data)}`,false); let isSuccess=!!(data&&(data.status===true||data.status==='success'||data.success===true||(data.result&&data.result.success===true))); if(response.ok&&isSuccess){ saveVideoSuccess(videoId); addLog(`✅ LIKE BERHASIL! Like akan masuk dalam 5-60 menit. Video ini bisa di-suntik lagi setelah 24 jam.`,false); }else{ addLog(`❌ LIKE GAGAL: ${data.message||data.error||data.reason||'Gagal'}`,true); } }catch(e){ addLog(`❌ Error koneksi: ${e.message}`,true); } }
</script>
</body>
</html>
