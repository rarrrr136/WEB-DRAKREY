<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DARKREY - LOGIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Courier New', monospace; color: #0f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.2; pointer-events: none; }
        .refresh-indicator { position: fixed; top: -50px; left: 0; width: 100%; height: 50px; background: rgba(255,0,0,0.9); color: #fff; display: flex; justify-content: center; align-items: center; font-size: 14px; transition: top 0.3s; z-index: 9999; }
        .container { position: relative; z-index: 10; width: 100%; max-width: 450px; padding: 20px; }
        .card { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-radius: 28px; padding: 35px 30px; text-align: center; border: 1px solid rgba(255,0,0,0.4); box-shadow: 0 0 40px rgba(255,0,0,0.2); }
        .logo { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 16px; object-fit: cover; box-shadow: 0 0 20px rgba(255,0,0,0.7); display: block; }
        h1 { color: #f00; font-size: 2rem; margin-bottom: 8px; }
        p { color: #aaa; font-size: 0.8rem; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: #000; border: 1px solid #f00; border-radius: 16px; color: #0f0; font-family: monospace; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #000; border: 1px solid #f00; color: #f00; border-radius: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #f00; color: #000; }
        .error { color: #ff6666; font-size: 0.75rem; margin-top: 15px; }
        @media (max-width: 480px) { .logo { width: 100px; height: 100px; } h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div id="refreshIndicator" class="refresh-indicator">↓ Tarik ke bawah untuk refresh</div>
<div class="container">
    <div class="card">
        <img src="https://i.ibb.co.com/cVJhWXV/file-00000000cd70720b956cca190dd4f411.jpg" class="logo" onerror="this.src='https://placehold.co/400x400?text=DARKREY'">
        <h1>🔥 DARKREY 🔥</h1>
        <p>Welcome Back, Sign in to continue</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Sign In →</button>
        <div id="errorMsg" class="error"></div>
    </div>
</div>
<script>
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const chars = "01アイウエオカキクケコサシスセソタチツテト0123456789";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = [];
    for(let i = 0; i < columns; i++) drops[i] = 1;
    function drawMatrix() {
        ctx.fillStyle = 'rgba(0,0,0,0.04)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#0f0'; ctx.font = fontSize + 'px monospace';
        for(let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    let touchStartY = 0, refreshIndicator = document.getElementById('refreshIndicator');
    document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
    document.addEventListener('touchmove', (e) => { if((window.scrollY||document.documentElement.scrollTop)===0 && e.touches[0].clientY>touchStartY+50) refreshIndicator.style.top='0px'; });
    document.addEventListener('touchend', () => { if(refreshIndicator.style.top==='0px') { refreshIndicator.style.top='-50px'; location.reload(); } });
    const HARCODED_USERS = [{ username: 'RAZZ', password: '123', isAdmin: false }, { username: 'REYY.X', password: 'killer', isAdmin: true }, { username: 'Yanzz', password: 'angjay', isAdmin: false }];
    function login() {
        const user = document.getElementById('username').value.trim(), pass = document.getElementById('password').value.trim();
        let localUsers = []; try { localUsers = JSON.parse(localStorage.getItem('darkray_users') || '[]'); } catch(e) {}
        const found = [...HARCODED_USERS, ...localUsers].find(u => u.username === user && u.password === pass);
        if(found) { localStorage.setItem('darkray_logged', 'true'); localStorage.setItem('darkray_current_user', user); window.location.href = 'index.html'; }
        else { document.getElementById('errorMsg').innerHTML = '❌ Username atau password salah!'; setTimeout(() => document.getElementById('errorMsg').innerHTML = '', 3000); }
    }
</script>
</body>
</html>
